name: Build LaTeX

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - ".github/**"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Japanese PDF
        env:
          LANG_TYPE: japanese
        run: |
          cd sample/japanese
          latexmk main.tex

      - name: Build English PDF
        env:
          LANG_TYPE: english
        run: |
          cd sample/english
          latexmk main.tex

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            sample/japanese/main.pdf
            sample/english/main.pdf

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdfs

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "${VERSION}" -t "${VERSION}" \
            sample/japanese/main.pdf \
            sample/english/main.pdf
