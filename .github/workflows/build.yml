name: Build LaTeX

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - ".github/**"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build default Japanese template
        run: |
          mkdir -p /tmp/test_ja
          cp format/default_japanese/template.tex /tmp/test_ja/main.tex
          cp format/default_japanese/latexmk.conf /tmp/test_ja/latexmk.conf
          cd /tmp/test_ja
          latexmk -r $GITHUB_WORKSPACE/.latexmkrc main.tex

      - name: Build default English template
        run: |
          mkdir -p /tmp/test_en
          cp format/default_english/template.tex /tmp/test_en/main.tex
          cp format/default_english/latexmk.conf /tmp/test_en/latexmk.conf
          cd /tmp/test_en
          latexmk -r $GITHUB_WORKSPACE/.latexmkrc main.tex

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            /tmp/test_ja/main.pdf
            /tmp/test_en/main.pdf
