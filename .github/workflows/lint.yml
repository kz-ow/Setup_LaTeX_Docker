name: Lint

on:
  push:
    branches: [main]
    paths:
      - "sample/**/*.tex"
      - ".textlintrc"
      - "prh.yml"
  pull_request:
    branches: [main]

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run textlint (Japanese)
        run: npx textlint sample/japanese/sections/*.tex sample/japanese/main.tex
