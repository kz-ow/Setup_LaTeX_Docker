name: Lint

on:
  push:
    branches: [main]
    paths:
      - "papers/**/*.tex"
      - "format/**/*.tex"
      - ".textlintrc"
      - "prh.yml"
  pull_request:
    branches: [main]

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run textlint
        run: |
          FILES=$(find papers/ format/ -name "*.tex" 2>/dev/null | head -50)
          if [ -n "$FILES" ]; then
            npx textlint $FILES
          else
            echo "No .tex files found, skipping."
          fi
